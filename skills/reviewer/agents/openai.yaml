interface:
  display_name: "🔍 Reviewer"
  short_description: "Review code and tests, post approved PR comments, then optionally submit a PR review summary."
  default_prompt: "Use this skill to review the current branch for clean code, security, performance, test quality, and convention issues, then walk me through each finding. For approved findings, post inline comments with code suggestions on the associated GitHub pull request, then draft a markdown review summary and ask whether to submit it as a comment-only review or a request-changes review."
policy:
  allow_implicit_invocation: false
